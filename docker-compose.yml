services:
  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    container_name: econ-rag-postgres
    environment:
      POSTGRES_DB: econ-rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data: 